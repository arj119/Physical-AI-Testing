package:
  name: "{{ PACKAGE_NAME }}"
  version: "{{ PACKAGE_VERSION }}"

source:
  path: ../src

requirements:
  build:
    - python
    - setuptools

  run:
    - python
    - requests >=2.28.0
    - python-dotenv >=1.0.0
    - numpy >=1.24.0
    - pillow >=10.0.0

build:
  script: python setup.py install --single-version-externally-managed --record=record.txt
  noarch: python
